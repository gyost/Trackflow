<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" width="100%" height="100%">
  <defs>
    <!-- Linear Gradients for Premium Kinetic Branding -->
    <linearGradient id="logo-icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C4FF" />
      <stop offset="50%" stop-color="#0066FF" />
      <stop offset="100%" stop-color="#001F66" />
    </linearGradient>

    <linearGradient id="logo-speed-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00DFFF" />
      <stop offset="100%" stop-color="#0052FF" />
    </linearGradient>
  </defs>

  <!-- Left Graphic Mark: Slanted & Aerodynamic 'T+S' with Speed Trails -->
  <g transform="skewX(-16) translate(30, 2)">
    <!-- Speed Trail 1 (Top) -->
    <rect x="-2" y="36" width="18" height="5" rx="2.5" fill="url(#logo-speed-gradient)" />
    
    <!-- Speed Trail 2 (Middle) -->
    <rect x="-12" y="47" width="22" height="5" rx="2.5" fill="url(#logo-speed-gradient)" />
    
    <!-- Speed Trail 3 (Bottom) -->
    <rect x="-6" y="58" width="16" height="5" rx="2.5" fill="url(#logo-speed-gradient)" />

    <!-- Top Horizontal Bar of 'T' -->
    <rect x="15" y="16" width="55" height="8.5" rx="4" fill="url(#logo-icon-gradient)" />

    <!-- Sleek Slanted Stem & Connected 'S' Loop Curve -->
    <!-- Formed seamlessly with a path with rounded caps and joinery -->
    <path 
      d="M 43 21
         L 32 50 
         C 30 55, 36 55, 42 55
         C 50 55, 55 58, 51 68
         L 44 76
         C 41 81, 33 81, 26 81
         L 16 81" 
      stroke="url(#logo-icon-gradient)" 
      stroke-width="8.5" 
      stroke-linecap="round" 
      stroke-linejoin="round"
      fill="none"
    />
  </g>

  <!-- Right Logotype: Stylized Corporate Typography -->
  <!-- "Track" in deep navy, "Flow" in energetic brand blue, italicized for kinetic flow -->
  <text 
    x="146" 
    y="78" 
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
    font-weight="850" 
    font-style="italic" 
    font-size="52" 
    letter-spacing="-1.5px"
  >
    <tspan fill="#0C1530">Track</tspan><tspan fill="#0066FF">Flow</tspan>
  </text>
</svg>
